<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preload" href="fonts/Alef-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <script src="pages.js"></script>
    <link rel="stylesheet" href="style.css">
    <meta property="og:description" content="כתיבה אילוצית עברית">  <!-- og:description is required for WhatsApp to show og:image -->
    <meta property="og:image" content="https://eyalgruss.com/constrained/media/og_image.jpg">
    <noscript><style>body {visibility: visible}</style></noscript>
    <style>
        @keyframes stroke {
            50% { -webkit-text-stroke-color: var(--fg_dim) }
        }

        #dot:is(:hover, :focus-visible), .zoom #dot {
            animation: var(--icon_dur) infinite stroke;
            -webkit-text-stroke-width: 1px;
        }

        #dot {
            display: inline-block;
            line-height: .3;
            margin-inline: -.29em -.1em;
            padding-bottom: .1em;
            padding-inline-start: .34em;
            position: relative;
            text-decoration: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            transition: transform 5s cubic-bezier(1, 0, 1, 0);
        }

        .zoom {
            overflow: hidden;
            pointer-events: none;
            transform: translate(var(--x), var(--y)) scale(2000);
        }
    </style>
</head>
<body onload="document.body.style.visibility = 'visible'" onpageshow="if (event.persisted) location.reload()">
    <noscript dir="ltr"><p>Please enable JavaScript to view contents.</p></noscript>
    <script>
        make_header()
        const p = document.createElement('p')
        p.textContent = 'מרחב של שיח תואם ובו מ־אות חישל שבח רם:'
        p.className = 'preface_he'
        const author = document.querySelector('.author')
        author.before(p)

        function zoom(event) {
            event.preventDefault()
            addEventListener('wheel', e => e.preventDefault())
            document.documentElement.style.touchAction = 'none'
            const vv = window.visualViewport
            const rect = dot.getBoundingClientRect()
            const ox = scrollX + rect.left + rect.width/2
            const oy = scrollY + rect.top + rect.height/2
            const body = document.body
            const style = body.style
            style.setProperty('transform-origin', `${ox}px ${oy}px`);
            style.setProperty('--x', `${vv.pageLeft + vv.width/2 - ox}px`)
            style.setProperty('--y', `${vv.pageTop + vv.height/2 - oy}px`)
            body.addEventListener('transitionend', e => location = page2url('me/'))
            body.classList.add('zoom')
        }

        author.firstChild.innerHTML = author.firstChild.innerHTML.replace(/([א-ת]+)(\u05bc)([א-ת]*)/, `<span class="nowrap">$1<a id="dot" href="#" onclick="zoom(event)">$2</a>$3</span>`)
        make_contents()
        make_footer()
    </script>
</body>
</html>
